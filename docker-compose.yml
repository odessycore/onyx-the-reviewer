services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: ai-pr-reviewer-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: reviewer
      POSTGRES_PASSWORD: reviewer
      POSTGRES_DB: ai_pr_reviewer
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U reviewer -d ai_pr_reviewer']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
